body:
  text: 雜字苨苨草盛也陸德明毛詩釋文引張揖菡萏華未發也巳發名芙蓉亦曰芙渠爾雅釋文云引說文張揖同未秀曰烏蓲同上引張揖荈茗之別名也同上引張揖雜字犦亡角反同上引張揖犩魚威反同上引郭云張揖同齛音世羊食巳吐而更嚼之同上引張揖詁者古今之異語也同上引張揖雜字訓者謂字有意義也同上參著曰梏周禮釋文引張揖偏著曰桎同上宣曲宮名在昆池西也史記貨殖列傳張守節正義引張揖瘑古和反釋元應解脫道論音義痛癢疼是也六度集音義麃步交反即麞也爾雅釋文引張揖壻婢之子謂之臧婦奴之子謂之獲莊于釋文引張揖忕音曳狃忕過度爾雅釋文引張揖雜字繭纊新綿同上引張揖慸介鯁刺也史記屈原賈誼列傳司馬貞索隱引張揖衝蓯相入貌集韻上聲二腫衝字注引張揖說憖傷也集韻去聲二十二稕憖字注引張揖說
